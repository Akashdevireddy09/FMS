<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AeroNexus — Profile</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="page-wrap">
  <nav class="navbar">
    <a class="brand" href="login.html">✈ AeroNexus</a>
    <div class="nav-links">
      <a href="user-dashboard.html">Dashboard</a>
      <a href="flight-search.html">Search Flights</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-user">
      <span id="nav-username"></span> &nbsp;|&nbsp;
      <button onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <div class="main">
    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Your registered account details.</p>
    <div class="card" id="profile-card"></div>
  </div>
  <div class="footer">AeroNexus Flight Management System &copy; 2025</div>
</div>
<script src="../js/data.js"></script>
<script>
function guardCustomer() {
  if (!DB.session || DB.session.role !== 'customer') { window.location.href = 'login.html'; return false; }
  return true;
}
function logout() { DB.session = null; window.location.href = 'login.html'; }

function init() {
  if (!guardCustomer()) return;
  const user = DB.users.find(u => u.userId === DB.session.userId);
  if (!user) return;
  document.getElementById('nav-username').textContent = user.userName;
  const catMap = { Silver:'badge-grey', Gold:'badge-gold', Platinum:'badge-purple' };
  document.getElementById('profile-card').innerHTML = `
    <div class="card-title">Personal Information</div>
    <table style="font-size:14px; width:100%;">
      <tr><td style="padding:7px 14px; color:#555; width:40%;">User ID</td><td style="padding:7px 14px;"><b>#${user.userId}</b></td></tr>
      <tr style="background:#f7f9fc;"><td style="padding:7px 14px; color:#555;">Full Name</td><td style="padding:7px 14px;">${user.userName}</td></tr>
      <tr><td style="padding:7px 14px; color:#555;">Email</td><td style="padding:7px 14px;">${user.emailId}</td></tr>
      <tr style="background:#f7f9fc;"><td style="padding:7px 14px; color:#555;">Phone</td><td style="padding:7px 14px;">${user.phone}</td></tr>
      <tr><td style="padding:7px 14px; color:#555;">Date of Birth</td><td style="padding:7px 14px;">${user.dob}</td></tr>
      <tr style="background:#f7f9fc;"><td style="padding:7px 14px; color:#555;">Address</td><td style="padding:7px 14px;">${user.address1}${user.address2 ? ', ' + user.address2 : ''}</td></tr>
      <tr><td style="padding:7px 14px; color:#555;">City / State</td><td style="padding:7px 14px;">${user.city}, ${user.state}</td></tr>
      <tr style="background:#f7f9fc;"><td style="padding:7px 14px; color:#555;">Country / ZIP</td><td style="padding:7px 14px;">${user.country} — ${user.zipCode}</td></tr>
      <tr><td style="padding:7px 14px; color:#555;">Loyalty Tier</td><td style="padding:7px 14px;"><span class="badge ${catMap[user.customerCategory]||'badge-grey'}">${user.customerCategory}</span></td></tr>
    </table>`;
}
init();
</script>
</body>
</html>
