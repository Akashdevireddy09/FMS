<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AeroNexus — Fare & Discount Details</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════
     MEMBER 6 — Fare & Discount Module
     Reads:  DB.bookingDraft (from Member 5)
     Shows:  Full fare breakdown, all
             discount types applied
     Output: Confirms total → DB.bookingDraft
             → payment.html
══════════════════════════════════════ -->

<div class="page-wrap">

  <nav class="navbar">
    <a class="brand" href="login.html">✈ AeroNexus</a>
    <div class="nav-links">
      <a href="user-dashboard.html">Dashboard</a>
      <a href="flight-search.html">Search Flights</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-user">
      <span id="nav-username"></span> &nbsp;|&nbsp;
      <button onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">

    <span class="back-link" onclick="history.back()">← Back</span>

    <h1 class="page-title">Fare & Discount Details</h1>
    <p class="page-subtitle">Review how your fare and applicable discounts are calculated.</p>

    <div id="fare-alert"></div>

    <!-- Fare breakdown card -->
    <div class="card" id="fare-breakdown-card"></div>

    <!-- Discount info card -->
    <div class="card" id="discount-info-card"></div>

    <!-- Proceed button -->
    <div class="btn-group" id="fare-actions" style="display:none;">
      <button class="btn btn-primary" onclick="proceedToPayment()">Proceed to Payment →</button>
      <button class="btn btn-secondary" onclick="history.back()">Go Back</button>
    </div>

  </div>

  <div class="footer">AeroNexus Flight Management System &copy; 2025</div>
</div>

<script src="../js/data.js"></script>
<script>

function guardCustomer() {
  if (!DB.session || DB.session.role !== 'customer') {
    window.location.href = 'login.html'; return false;
  }
  return true;
}
function logout() { DB.session = null; window.location.href = 'login.html'; }

function showAlert(type, msg) {
  const el = document.getElementById('fare-alert');
  el.innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
}

/* ── Full discount calculation logic ── */
function calculateFareDetails(flight, schedule, carrier, user, seatClass, noOfSeats) {
  const baseFare   = flight.airFare;
  const daysAhead  = Math.ceil((new Date(schedule.dateOfTravel) - new Date()) / 86400000);

  /* Advance booking discount */
  let advDisc = 0, advDiscLabel = 'None';
  if (daysAhead >= 90) {
    advDisc = carrier.disc90 || 0;
    advDiscLabel = `${advDisc}% (90+ days advance)`;
  } else if (daysAhead >= 60) {
    advDisc = carrier.disc60 || 0;
    advDiscLabel = `${advDisc}% (60+ days advance)`;
  } else if (daysAhead >= 30) {
    advDisc = carrier.disc30 || 0;
    advDiscLabel = `${advDisc}% (30+ days advance)`;
  }

  /* Loyalty tier discount */
  const tierDiscMap = {
    Silver:   carrier.silverDisc   || 0,
    Gold:     carrier.goldDisc     || 0,
    Platinum: carrier.platinumDisc || 0
  };
  const tierDisc = tierDiscMap[user.customerCategory] || 0;

  /* Bulk discount (if more than 5 seats) */
  const bulkDisc = noOfSeats >= 5 ? (carrier.bulkDiscount || 0) : 0;

  /* Class multiplier */
  const classMultiplier = { Economy: 1.0, Business: 1.8, Executive: 2.5 }[seatClass] || 1.0;

  /* Base fare for this class */
  const classFare = Math.round(baseFare * classMultiplier);

  /* Total discount capped at 50% */
  const totalDiscPct = Math.min(advDisc + tierDisc + bulkDisc, 50);
  const discountAmt  = Math.round(classFare * totalDiscPct / 100);
  const farePerSeat  = classFare - discountAmt;
  const totalAmount  = farePerSeat * noOfSeats;

  return {
    baseFare, classFare, classMultiplier,
    advDisc, advDiscLabel,
    tierDisc, bulkDisc,
    totalDiscPct, discountAmt,
    farePerSeat, totalAmount,
    daysAhead, noOfSeats, seatClass
  };
}

/* ── Render fare breakdown card ── */
function renderFareBreakdown(details, flight, schedule) {
  document.getElementById('fare-breakdown-card').innerHTML = `
    <div class="card-title">Fare Breakdown</div>
    <table style="font-size:14px; width:100%;">
      <tr style="background:#f7f9fc;">
        <td style="padding:7px 12px; color:#555; width:55%;">Route</td>
        <td style="padding:7px 12px;"><b>${flight.origin} → ${flight.destination}</b></td>
      </tr>
      <tr>
        <td style="padding:7px 12px; color:#555;">Date of Travel</td>
        <td style="padding:7px 12px;">${schedule.dateOfTravel} <small style="color:#888;">(${details.daysAhead} days from today)</small></td>
      </tr>
      <tr style="background:#f7f9fc;">
        <td style="padding:7px 12px; color:#555;">Seat Class</td>
        <td style="padding:7px 12px;"><span class="badge badge-blue">${details.seatClass}</span></td>
      </tr>
      <tr>
        <td style="padding:7px 12px; color:#555;">Base Fare (Economy reference)</td>
        <td style="padding:7px 12px;">&#8377;${details.baseFare}</td>
      </tr>
      <tr style="background:#f7f9fc;">
        <td style="padding:7px 12px; color:#555;">Class Fare (×${details.classMultiplier})</td>
        <td style="padding:7px 12px;">&#8377;${details.classFare}</td>
      </tr>
      <tr>
        <td style="padding:7px 12px; color:#c0392b;">Total Discount (${details.totalDiscPct}%)</td>
        <td style="padding:7px 12px; color:#c0392b;">− &#8377;${details.discountAmt}</td>
      </tr>
      <tr style="background:#eafaf1; font-weight:bold;">
        <td style="padding:8px 12px;">Fare per Seat</td>
        <td style="padding:8px 12px; color:#1e8449;">&#8377;${details.farePerSeat}</td>
      </tr>
      <tr>
        <td style="padding:7px 12px; color:#555;">Number of Seats</td>
        <td style="padding:7px 12px;">${details.noOfSeats}</td>
      </tr>
      <tr style="background:#1a3a5c;">
        <td style="padding:10px 12px; color:#fff; font-size:1rem; font-weight:bold;">Total Amount</td>
        <td style="padding:10px 12px; color:#fff; font-size:1rem; font-weight:bold;">&#8377;${details.totalAmount}</td>
      </tr>
    </table>`;
}

/* ── Render discount info card ── */
function renderDiscountInfo(details, carrier, user) {
  document.getElementById('discount-info-card').innerHTML = `
    <div class="card-title">Discounts Applied</div>
    <table style="font-size:13px; width:100%;">
      <thead>
        <tr>
          <th>Discount Type</th>
          <th>Rate</th>
          <th>Applied?</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="padding:6px 12px;">Advance Booking (30 days)</td>
          <td style="padding:6px 12px;">${carrier.disc30}%</td>
          <td style="padding:6px 12px;">${details.daysAhead >= 30 && details.daysAhead < 60 ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-grey">No</span>'}</td>
        </tr>
        <tr style="background:#f7f9fc;">
          <td style="padding:6px 12px;">Advance Booking (60 days)</td>
          <td style="padding:6px 12px;">${carrier.disc60}%</td>
          <td style="padding:6px 12px;">${details.daysAhead >= 60 && details.daysAhead < 90 ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-grey">No</span>'}</td>
        </tr>
        <tr>
          <td style="padding:6px 12px;">Advance Booking (90 days)</td>
          <td style="padding:6px 12px;">${carrier.disc90}%</td>
          <td style="padding:6px 12px;">${details.daysAhead >= 90 ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-grey">No</span>'}</td>
        </tr>
        <tr style="background:#f7f9fc;">
          <td style="padding:6px 12px;">Loyalty Tier (${user.customerCategory})</td>
          <td style="padding:6px 12px;">${details.tierDisc}%</td>
          <td style="padding:6px 12px;">${details.tierDisc > 0 ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-grey">No</span>'}</td>
        </tr>
        <tr>
          <td style="padding:6px 12px;">Bulk Booking (5+ seats)</td>
          <td style="padding:6px 12px;">${carrier.bulkDiscount}%</td>
          <td style="padding:6px 12px;">${details.bulkDisc > 0 ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-grey">No</span>'}</td>
        </tr>
        <tr style="background:#eafaf1; font-weight:bold;">
          <td style="padding:7px 12px;">Total Discount Applied</td>
          <td style="padding:7px 12px;">${details.totalDiscPct}%</td>
          <td style="padding:7px 12px;"><span class="badge badge-green">Active</span></td>
        </tr>
      </tbody>
    </table>
    <p style="font-size:12px; color:#888; margin-top:8px;">* Maximum combined discount is capped at 50%.</p>`;
}

/* ── Proceed to payment ── */
function proceedToPayment() {
  window.location.href = 'payment.html';
}

/* ── Init ── */
function init() {
  if (!guardCustomer()) return;

  const user = DB.users.find(u => u.userId === DB.session.userId);
  if (user) document.getElementById('nav-username').textContent = user.userName;

  const draft = DB.bookingDraft;
  if (!draft) { showAlert('error', 'No booking in progress. Please start from flight search.'); return; }

  const flight   = DB.flights.find(f => f.flightId === draft.flightId);
  const schedule = DB.schedules.find(s => s.scheduleId === draft.scheduleId);
  const carrier  = DB.carriers.find(c => c.carrierId === (flight || {}).carrierId) || {};

  if (!flight || !schedule) { showAlert('error', 'Flight data error. Please search again.'); return; }

  const details = calculateFareDetails(flight, schedule, carrier, user || {}, draft.seatClass, draft.noOfSeats);

  /* Update draft with computed total */
  DB.bookingDraft.totalAmount  = details.totalAmount;
  DB.bookingDraft.farePerSeat  = details.farePerSeat;

  renderFareBreakdown(details, flight, schedule);
  renderDiscountInfo(details, carrier, user || {});

  document.getElementById('fare-actions').style.display = 'flex';
}

init();
</script>
</body>
</html>
