<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AeroNexus — Select Flight</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════
     MEMBER 5 — Flight Selection Module
     Reads: DB.selectedFlight (from Member 4)
     Shows: full flight details, seat picker
     Output: DB.bookingDraft → booking-confirmation.html
══════════════════════════════════════ -->

<div class="page-wrap">

  <nav class="navbar">
    <a class="brand" href="login.html">✈ AeroNexus</a>
    <div class="nav-links">
      <a href="user-dashboard.html">Dashboard</a>
      <a href="flight-search.html">Search Flights</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-user">
      <span id="nav-username"></span> &nbsp;|&nbsp;
      <button onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">

    <span class="back-link" onclick="history.back()">← Back to Available Flights</span>

    <h1 class="page-title">Flight Details</h1>
    <p class="page-subtitle">Review your selected flight and choose number of seats.</p>

    <div id="selection-alert"></div>

    <!-- Flight summary card -->
    <div class="card" id="flight-summary"></div>

    <!-- Seat selection card -->
    <div class="card" id="seat-selection-card" style="display:none;">
      <div class="card-title">Select Number of Seats</div>

      <div class="form-group" style="max-width:300px;">
        <label class="form-label">
          Number of Seats <span class="required">*</span>
        </label>
        <input id="seat-count" class="form-input" type="number"
               min="1" max="10" value="1"
               oninput="updateTotal()"
               title="Maximum 10 seats per booking"/>
        <div class="field-error" id="err-seats"></div>
        <div class="tooltip-hint" id="seat-avail-hint"></div>
      </div>

      <!-- Fare breakdown -->
      <div class="card" style="background:#f7f9fc; max-width:360px;">
        <div class="card-title">Fare Breakdown</div>
        <table style="font-size:14px;">
          <tr>
            <td style="padding:4px 8px; color:#555;">Fare per seat</td>
            <td style="padding:4px 8px;" id="td-fare-per-seat">—</td>
          </tr>
          <tr>
            <td style="padding:4px 8px; color:#555;">Number of seats</td>
            <td style="padding:4px 8px;" id="td-seats">1</td>
          </tr>
          <tr style="border-top:1px solid #ddd; font-weight:bold;">
            <td style="padding:6px 8px;">Total Amount</td>
            <td style="padding:6px 8px; color:#1a3a5c;" id="td-total">—</td>
          </tr>
        </table>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="proceedToConfirm()">
          Proceed to Booking →
        </button>
        <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
      </div>
    </div>

  </div>

  <div class="footer">AeroNexus Flight Management System &copy; 2025</div>
</div>

<script src="../js/data.js"></script>
<script>

function guardCustomer() {
  if (!DB.session || DB.session.role !== 'customer') {
    window.location.href = 'login.html'; return false;
  }
  return true;
}

function logout() { DB.session = null; window.location.href = 'login.html'; }

function showAlert(type, msg) {
  const el = document.getElementById('selection-alert');
  el.innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
}

let selectedData = null;

/* ── Update total as seat count changes ── */
function updateTotal() {
  if (!selectedData) return;
  const seats = parseInt(document.getElementById('seat-count').value) || 0;
  document.getElementById('td-seats').textContent = seats;
  document.getElementById('td-total').textContent = `₹${seats * selectedData.farePerSeat}`;
}

/* ── Availability by class ── */
function getAvailable(schedule, flight, cls) {
  const cap    = { Economy: flight.seatEconomy, Business: flight.seatBusiness, Executive: flight.seatExecutive };
  const booked = { Economy: schedule.bookedEconomy, Business: schedule.bookedBusiness, Executive: schedule.bookedExecutive };
  return (cap[cls] || 0) - (booked[cls] || 0);
}

/* ── Build flight summary card ── */
function buildSummary(flight, schedule, carrier, seatClass, farePerSeat, available, user) {
  document.getElementById('flight-summary').innerHTML = `
    <div class="card-title">Selected Flight</div>
    <table style="font-size:14px;">
      <tr><td style="padding:5px 12px; color:#555; width:180px;">Route</td>
          <td style="padding:5px 12px;"><b>${flight.origin} → ${flight.destination}</b></td></tr>
      <tr><td style="padding:5px 12px; color:#555;">Carrier</td>
          <td style="padding:5px 12px;">${carrier.carrierName || 'Unknown'}</td></tr>
      <tr><td style="padding:5px 12px; color:#555;">Flight No.</td>
          <td style="padding:5px 12px;">#${flight.flightId}</td></tr>
      <tr><td style="padding:5px 12px; color:#555;">Date of Travel</td>
          <td style="padding:5px 12px;">${schedule.dateOfTravel}</td></tr>
      <tr><td style="padding:5px 12px; color:#555;">Seat Class</td>
          <td style="padding:5px 12px;"><span class="badge badge-blue">${seatClass}</span></td></tr>
      <tr><td style="padding:5px 12px; color:#555;">Seats Available</td>
          <td style="padding:5px 12px;">${available}</td></tr>
      <tr><td style="padding:5px 12px; color:#555;">Fare per Seat</td>
          <td style="padding:5px 12px;">&#8377;${farePerSeat} <small style="color:#888;">(incl. your ${user.customerCategory} discount)</small></td></tr>
    </table>`;
}

/* ── Proceed to confirmation ── */
function proceedToConfirm() {
  document.getElementById('err-seats').textContent = '';
  const seats    = parseInt(document.getElementById('seat-count').value);
  const available = selectedData.available;

  if (!seats || seats < 1)  { document.getElementById('err-seats').textContent = 'Please enter at least 1 seat.'; return; }
  if (seats > available)    { document.getElementById('err-seats').textContent = `Only ${available} seats available.`; return; }
  if (seats > 10)           { document.getElementById('err-seats').textContent = 'Maximum 10 seats per booking.'; return; }

  /* Pass draft to booking confirmation (Member 7) */
  DB.bookingDraft = {
    flightId:    selectedData.flightId,
    scheduleId:  selectedData.scheduleId,
    seatClass:   selectedData.seatClass,
    farePerSeat: selectedData.farePerSeat,
    noOfSeats:   seats,
    totalAmount: seats * selectedData.farePerSeat,
    dateOfTravel: selectedData.dateOfTravel
  };

  window.location.href = 'booking-confirmation.html';
}

/* ── Init ── */
function init() {
  if (!guardCustomer()) return;

  const user = DB.users.find(u => u.userId === DB.session.userId);
  if (user) document.getElementById('nav-username').textContent = user.userName;

  const sel = DB.selectedFlight;
  if (!sel) {
    showAlert('error', 'No flight selected. Please search again.');
    return;
  }

  const flight   = DB.flights.find(f => f.flightId === sel.flightId);
  const schedule = DB.schedules.find(s => s.scheduleId === sel.scheduleId);
  const carrier  = DB.carriers.find(c => c.carrierId === (flight || {}).carrierId) || {};

  if (!flight || !schedule) {
    showAlert('error', 'Flight data not found. Please go back and search again.');
    return;
  }

  const available = getAvailable(schedule, flight, sel.seatClass);

  if (available <= 0) {
    showAlert('error', 'Sorry, no seats available for this class. Please go back and select another.');
    return;
  }

  selectedData = { ...sel, available, dateOfTravel: schedule.dateOfTravel };

  buildSummary(flight, schedule, carrier, sel.seatClass, sel.farePerSeat, available, user || {});

  /* Seat selection UI */
  const card = document.getElementById('seat-selection-card');
  card.style.display = 'block';
  const max = Math.min(available, 10);
  document.getElementById('seat-count').max = max;
  document.getElementById('seat-avail-hint').textContent = `Max ${max} seats per booking`;
  document.getElementById('td-fare-per-seat').textContent = `₹${sel.farePerSeat}`;
  updateTotal();
}

init();
</script>
</body>
</html>
