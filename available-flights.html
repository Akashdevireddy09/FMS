<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AeroNexus — Available Flights</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════
     MEMBER 4 — Available Flights Module
     Reads: DB.searchParams (from Member 3)
     Displays: matching flight schedules
     Output: on select → flight-selection.html
══════════════════════════════════════ -->

<div class="page-wrap">

  <nav class="navbar">
    <a class="brand" href="login.html">✈ AeroNexus</a>
    <div class="nav-links">
      <a href="user-dashboard.html">Dashboard</a>
      <a href="flight-search.html">Search Flights</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-user">
      <span id="nav-username"></span> &nbsp;|&nbsp;
      <button onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">

    <span class="back-link" onclick="history.back()">← Back to Search</span>

    <h1 class="page-title">Available Flights</h1>
    <p class="page-subtitle" id="search-summary">Showing all available flights.</p>

    <div id="flights-alert"></div>

    <!-- Sort / Filter bar -->
    <div style="display:flex; gap:12px; align-items:center; margin-bottom:14px; flex-wrap:wrap;">
      <label style="font-size:13px;">Sort by:</label>
      <select id="sort-by" class="form-select" style="width:auto;"
              onchange="renderResults()">
        <option value="date">Date (Earliest First)</option>
        <option value="fare-asc">Fare (Low to High)</option>
        <option value="fare-desc">Fare (High to Low)</option>
      </select>
      <span id="result-count" style="font-size:13px; color:#666; margin-left:8px;"></span>
    </div>

    <!-- Results container -->
    <div id="results-container"></div>

  </div>

  <div class="footer">AeroNexus Flight Management System &copy; 2025</div>
</div>

<script src="../js/data.js"></script>
<script>

function guardCustomer() {
  if (!DB.session || DB.session.role !== 'customer') {
    window.location.href = 'login.html'; return false;
  }
  return true;
}

function logout() { DB.session = null; window.location.href = 'login.html'; }

/* ── Compute fare with discounts (used by Member 6 in detail, preview here) ── */
function getDiscountedFare(baseFare, dateOfTravel, carrier, category) {
  const daysAhead = Math.ceil((new Date(dateOfTravel) - new Date()) / 86400000);
  let advDisc = 0;
  if (daysAhead >= 90) advDisc = carrier.disc90 || 0;
  else if (daysAhead >= 60) advDisc = carrier.disc60 || 0;
  else if (daysAhead >= 30) advDisc = carrier.disc30 || 0;
  const tierDisc = { Silver: carrier.silverDisc, Gold: carrier.goldDisc, Platinum: carrier.platinumDisc }[category] || 0;
  const total = Math.min(advDisc + tierDisc, 50);
  return { discountedFare: Math.round(baseFare * (1 - total / 100)), totalDiscount: total };
}

/* ── Build result list ── */
function getResults() {
  const params = DB.searchParams || {};
  const from   = (params.from || '').toLowerCase().trim();
  const to     = (params.to   || '').toLowerCase().trim();
  const date   = params.date || '';
  const today  = new Date().toISOString().split('T')[0];

  const user    = DB.users.find(u => u.userId === DB.session.userId) || {};
  const results = [];

  DB.schedules.forEach(s => {
    if (s.dateOfTravel < today) return;
    const flight   = DB.flights.find(f => f.flightId === s.flightId);
    if (!flight) return;
    if (from && !flight.origin.toLowerCase().includes(from)) return;
    if (to   && !flight.destination.toLowerCase().includes(to)) return;
    if (date && s.dateOfTravel !== date) return;

    const carrier  = DB.carriers.find(c => c.carrierId === flight.carrierId) || {};
    const { discountedFare, totalDiscount } = getDiscountedFare(
      flight.airFare, s.dateOfTravel, carrier, user.customerCategory || 'Silver'
    );

    results.push({ flight, schedule: s, carrier, discountedFare, totalDiscount });
  });

  return results;
}

/* ── Sort ── */
function sortResults(results) {
  const by = document.getElementById('sort-by').value;
  return [...results].sort((a, b) => {
    if (by === 'date')      return a.schedule.dateOfTravel.localeCompare(b.schedule.dateOfTravel);
    if (by === 'fare-asc')  return a.discountedFare - b.discountedFare;
    if (by === 'fare-desc') return b.discountedFare - a.discountedFare;
    return 0;
  });
}

/* ── Availability check ── */
function avail(schedule, flight, cls) {
  const cap   = { Economy: flight.seatEconomy, Business: flight.seatBusiness, Executive: flight.seatExecutive };
  const booked = { Economy: schedule.bookedEconomy, Business: schedule.bookedBusiness, Executive: schedule.bookedExecutive };
  return (cap[cls] || 0) - (booked[cls] || 0);
}

/* ── Render ── */
function renderResults() {
  const raw     = getResults();
  const sorted  = sortResults(raw);
  const container = document.getElementById('results-container');
  document.getElementById('result-count').textContent =
    `${sorted.length} result(s) found`;

  if (sorted.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center; color:#888; padding:32px;">
        <div style="font-size:2rem; margin-bottom:8px;">✈</div>
        <p>No flights found for your search.</p>
        <a href="flight-search.html" style="font-size:13px;">← Modify Search</a>
      </div>`;
    return;
  }

  let html = '';
  sorted.forEach(r => {
    const { flight, schedule, carrier, discountedFare, totalDiscount } = r;
    const ecoAvail = avail(schedule, flight, 'Economy');
    const busAvail = avail(schedule, flight, 'Business');
    const exeAvail = avail(schedule, flight, 'Executive');

    const seatBtn = (cls, avl, multiplier) => {
      const fare = Math.round(discountedFare * multiplier);
      if (avl <= 0) return `<button class="btn btn-secondary btn-sm" disabled style="opacity:0.5;">${cls} — Full</button>`;
      return `<button class="btn btn-primary btn-sm"
        onclick="selectFlight(${flight.flightId},${schedule.scheduleId},'${cls}',${fare})">
        ${cls} — &#8377;${fare} (${avl} seats)
      </button>`;
    };

    html += `
    <div class="flight-card">
      <div class="flight-route">${flight.origin} → ${flight.destination}</div>
      <div class="flight-meta">
        <span>${carrier.carrierName || 'Unknown'}</span> &nbsp;·&nbsp;
        <span>Flight #${flight.flightId}</span> &nbsp;·&nbsp;
        <span>📅 ${schedule.dateOfTravel}</span>
        ${totalDiscount > 0 ? `&nbsp;·&nbsp;<span class="badge badge-green">${totalDiscount}% discount applied</span>` : ''}
      </div>

      <div style="font-size:13px; color:#555; margin-bottom:8px;">
        Base Fare: &#8377;${flight.airFare} &nbsp;
        ${totalDiscount > 0 ? `→ <b>&#8377;${discountedFare}</b> after discount` : ''}
      </div>

      <!-- Select class to book -->
      <div class="btn-group" style="margin-top:6px;">
        ${seatBtn('Economy',   ecoAvail, 1.0)}
        ${seatBtn('Business',  busAvail, 1.8)}
        ${seatBtn('Executive', exeAvail, 2.5)}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

/* ── On class selected: pass to flight-selection.html ── */
function selectFlight(flightId, scheduleId, seatClass, farePerSeat) {
  DB.selectedFlight = { flightId, scheduleId, seatClass, farePerSeat };
  window.location.href = 'flight-selection.html';
}

/* ── Init ── */
function init() {
  if (!guardCustomer()) return;

  const user = DB.users.find(u => u.userId === DB.session.userId);
  if (user) document.getElementById('nav-username').textContent = user.userName;

  const params = DB.searchParams || {};
  let summary = 'Showing all available flights.';
  if (params.from || params.to) {
    summary = `Flights from <b>${params.from || 'Any'}</b> to <b>${params.to || 'Any'}</b>`;
    if (params.date) summary += ` on <b>${params.date}</b>`;
  }
  document.getElementById('search-summary').innerHTML = summary;

  renderResults();
}

init();
</script>
</body>
</html>
