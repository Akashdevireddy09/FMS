<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AeroNexus — Search Flights</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════
     MEMBER 3 — Flight Search Module
     Inputs: Origin, Destination, Date
     Output: passes criteria to
             available-flights.html
══════════════════════════════════════ -->

<div class="page-wrap">

  <nav class="navbar">
    <a class="brand" href="login.html">✈ AeroNexus</a>
    <div class="nav-links">
      <a href="user-dashboard.html">Dashboard</a>
      <a href="flight-search.html">Search Flights</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-user">
      <span id="nav-username"></span> &nbsp;|&nbsp;
      <button onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">

    <h1 class="page-title">Search Flights</h1>
    <p class="page-subtitle">Enter your travel details to find available flights.</p>

    <div id="search-alert"></div>

    <div class="card">
      <div class="card-title">Flight Search</div>

      <div class="form-grid-3">
        <div class="form-group">
          <label class="form-label">
            From (Origin) <span class="required">*</span>
          </label>
          <input id="s-from" class="form-input" placeholder="e.g. Mumbai"
                 title="Enter departure city"/>
          <div class="field-error" id="err-from"></div>
        </div>

        <div class="form-group">
          <label class="form-label">
            To (Destination) <span class="required">*</span>
          </label>
          <input id="s-to" class="form-input" placeholder="e.g. Delhi"
                 title="Enter arrival city"/>
          <div class="field-error" id="err-to"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Date of Travel</label>
          <input id="s-date" class="form-input" type="date"
                 title="Leave blank to see all dates"/>
          <div class="tooltip-hint">Optional — leave blank to see all dates</div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="doSearch()">Search Flights</button>
        <button class="btn btn-secondary" onclick="showAll()">Show All Available Flights</button>
        <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <!-- Popular Routes (quick-fill helpers) -->
    <div class="card">
      <div class="card-title">Popular Routes</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="quickFill('Mumbai','Delhi')">Mumbai → Delhi</button>
        <button class="btn btn-secondary btn-sm" onclick="quickFill('Delhi','Bangalore')">Delhi → Bangalore</button>
        <button class="btn btn-secondary btn-sm" onclick="quickFill('Mumbai','Chennai')">Mumbai → Chennai</button>
        <button class="btn btn-secondary btn-sm" onclick="quickFill('Hyderabad','Kolkata')">Hyderabad → Kolkata</button>
        <button class="btn btn-secondary btn-sm" onclick="quickFill('Pune','Goa')">Pune → Goa</button>
      </div>
    </div>

    <!-- Live preview of matching flights count -->
    <div id="preview-msg" style="font-size:13px; color:#555; margin-top:8px;"></div>

  </div>

  <div class="footer">AeroNexus Flight Management System &copy; 2025</div>
</div>

<script src="../js/data.js"></script>
<script>

function guardCustomer() {
  if (!DB.session || DB.session.role !== 'customer') {
    window.location.href = 'login.html';
    return false;
  }
  return true;
}

function logout() {
  DB.session = null;
  window.location.href = 'login.html';
}

function showAlert(type, msg) {
  const el = document.getElementById('search-alert');
  el.innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
}

function setErr(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
}

function v(id) { return (document.getElementById(id) || {}).value || ''; }

/* ── Quick fill popular routes ── */
function quickFill(from, to) {
  document.getElementById('s-from').value = from;
  document.getElementById('s-to').value   = to;
  updatePreview();
}

/* ── Live count preview ── */
function updatePreview() {
  const from = v('s-from').toLowerCase().trim();
  const to   = v('s-to').toLowerCase().trim();
  if (!from && !to) { document.getElementById('preview-msg').textContent = ''; return; }

  const today = new Date().toISOString().split('T')[0];
  const count = DB.schedules.filter(s => {
    if (s.dateOfTravel < today) return false;
    const f = DB.flights.find(x => x.flightId === s.flightId);
    if (!f) return false;
    if (from && !f.origin.toLowerCase().includes(from)) return false;
    if (to   && !f.destination.toLowerCase().includes(to)) return false;
    return true;
  }).length;

  document.getElementById('preview-msg').textContent =
    count > 0 ? `${count} flight schedule(s) match this route.` : 'No flights found for this route.';
}

/* ── Main search ── */
function doSearch() {
  setErr('err-from', ''); setErr('err-to', '');
  showAlert('', '');

  const from = v('s-from').trim();
  const to   = v('s-to').trim();
  let ok = true;

  if (!from) { setErr('err-from', 'Please enter departure city.'); ok = false; }
  if (!to)   { setErr('err-to',   'Please enter arrival city.'); ok = false; }
  if (!ok) return;

  /* Store search params in DB (shared in-memory, picked up by Member 4) */
  DB.searchParams = { from, to, date: v('s-date') };

  window.location.href = 'available-flights.html';
}

/* ── Show all ── */
function showAll() {
  DB.searchParams = { from: '', to: '', date: '' };
  window.location.href = 'available-flights.html';
}

/* ── Clear ── */
function clearForm() {
  document.getElementById('s-from').value = '';
  document.getElementById('s-to').value   = '';
  document.getElementById('s-date').value = '';
  document.getElementById('preview-msg').textContent = '';
  showAlert('', '');
}

/* ── Init ── */
function init() {
  if (!guardCustomer()) return;
  const user = DB.users.find(u => u.userId === DB.session.userId);
  if (user) document.getElementById('nav-username').textContent = user.userName;

  /* Set minimum date on date picker */
  document.getElementById('s-date').min = new Date().toISOString().split('T')[0];

  /* Restore previous search if any */
  if (DB.searchParams) {
    document.getElementById('s-from').value = DB.searchParams.from || '';
    document.getElementById('s-to').value   = DB.searchParams.to   || '';
    document.getElementById('s-date').value = DB.searchParams.date || '';
    updatePreview();
  }

  /* Live preview on input */
  document.getElementById('s-from').addEventListener('input', updatePreview);
  document.getElementById('s-to').addEventListener('input', updatePreview);
}

init();
</script>
</body>
</html>
